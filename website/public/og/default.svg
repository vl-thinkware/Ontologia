<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4338CA"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="markBg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5B4FC"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="rgba(255,255,255,0.10)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle radial highlights -->
  <circle cx="1100" cy="80" r="240" fill="rgba(165, 180, 252, 0.25)"/>
  <circle cx="100" cy="560" r="200" fill="rgba(30, 27, 75, 0.40)"/>

  <!-- Logomark + wordmark, top-left -->
  <g transform="translate(64, 64)">
    <rect width="80" height="80" rx="18" fill="url(#markBg)"/>
    <g transform="translate(8, 8) scale(1.0)" stroke="#FAFAFB" fill="#FAFAFB" stroke-linecap="round">
      <path d="M14 50 L14 14" stroke-width="3.5" fill="none"/>
      <path d="M14 32 C 14 22, 28 22, 36 22" stroke-width="3.5" fill="none"/>
      <path d="M14 32 C 14 42, 36 42, 44 42" stroke-width="3.5" fill="none"/>
      <circle cx="14" cy="14" r="5"/>
      <circle cx="14" cy="50" r="5"/>
      <circle cx="40" cy="22" r="6.5"/>
      <circle cx="48" cy="42" r="6.5"/>
    </g>
    <text
      x="100"
      y="52"
      font-family="Inter, sans-serif"
      font-size="32"
      font-weight="700"
      fill="white"
      letter-spacing="-1"
    >Semlify</text>
  </g>

  <!-- Headline -->
  <text
    x="64"
    y="340"
    font-family="Inter, sans-serif"
    font-size="80"
    font-weight="700"
    fill="white"
    letter-spacing="-2"
  >The source of truth</text>
  <text
    x="64"
    y="430"
    font-family="Inter, sans-serif"
    font-size="80"
    font-weight="700"
    fill="white"
    letter-spacing="-2"
  >for your concepts.</text>

  <!-- Sub headline -->
  <text
    x="64"
    y="490"
    font-family="Inter, sans-serif"
    font-size="22"
    font-weight="400"
    fill="rgba(255,255,255,0.78)"
  >Design, version and ship the ontology your AI and data pipelines depend on.</text>

  <!-- Bottom strip: trust line -->
  <g transform="translate(64, 562)" font-family="Inter, sans-serif" font-size="16" fill="rgba(255,255,255,0.65)" font-weight="500">
    <text>SKOS · OWL · JSON-LD</text>
    <circle cx="240" cy="-5" r="2" fill="rgba(255,255,255,0.4)"/>
    <text x="254">Stable versioned API</text>
    <circle cx="448" cy="-5" r="2" fill="rgba(255,255,255,0.4)"/>
    <text x="462">Free tier, no credit card</text>
  </g>

  <!-- URL bottom-right -->
  <text
    x="1136"
    y="582"
    font-family="Inter, sans-serif"
    font-size="18"
    font-weight="600"
    fill="white"
    text-anchor="end"
  >semlify.com</text>
</svg>
